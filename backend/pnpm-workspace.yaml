packages:
  - '.'
# Ensure the lockfile resolves Linux binaries even when generated on
# Windows/macOS — Render builds on linux/x64 glibc.
supportedArchitectures:
  os:
    - linux
    - win32
    - darwin
  cpu:
    - x64
    - arm64
  libc:
    - glibc
# Refuse packages published less than 7 days ago (supply-chain safety).
minimumReleaseAge: 10080
