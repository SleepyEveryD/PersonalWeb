# Render Blueprint — defines both services in one file.
# Docs: https://render.com/docs/blueprint-spec
#
# After the first deploy, fill in the "sync: false" env vars in the dashboard:
#   backend  ALLOWED_ORIGIN -> the frontend Static Site URL
#   frontend VITE_API_URL   -> the backend Web Service URL  (then redeploy frontend)
services:
  # ── Backend: Node + TypeScript API ────────────────────────────────
  - type: web
    name: personalweb-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: ALLOWED_ORIGIN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  # ── Frontend: Vite static site ────────────────────────────────────
  - type: web
    name: personalweb-web
    runtime: static
    rootDir: frontend
    buildCommand: pnpm install && pnpm build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      # SPA fallback — serve index.html for client-side routes.
      - type: rewrite
        source: /*
        destination: /index.html
